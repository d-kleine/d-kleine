name: Check Links

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --exclude openai.com --exclude substack.com --verbose --no-progress './README.md' 
